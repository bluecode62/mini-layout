<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <!--Animate Bg-->
    <div class="bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <!--Main content-->
    <main class="container">
      <!--Logo-->
      <div class="logo">
        <div class="logo-icon">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <span>Flux</span>
      </div>

      <section class="hero">
        <div class="badge">
          <span class="pulse"></span>
          Coming Soon
        </div>
        <h1>Something awesome is brewing.</h1>
        <p>
          We're working hard to bring you something special.Be the first to know when we launch.
        </p>
      </section>

      <!--Countdown-->
      <section class="countdown">
        <div class="time-block">
          <span class="time-value" id="days">00</span>
          <span class="time-label">Days</span>
        </div>
        <span class="separator">:</span>

        <div class="time-block">
          <span class="time-value" id="hours">00</span>
          <span class="time-label">Hours</span>
        </div>
        <span class="separator">:</span>

        <div class="time-block">
          <span class="time-value" id="minutes">00</span>
          <span class="time-label">Minutes</span>
        </div>
        <span class="separator">:</span>

        <div class="time-block">
          <span class="time-value" id="seconds">00</span>
          <span class="time-label">Seconds</span>
        </div>
        <span class="separator">:</span>

        
      </section>

      <!--Email Form-->
      <form class="email-form" id="email-form">
        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" required placeholder="Enter your email" />
        </div>

        <button type="submit">
          Notify Me
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <!--Success Message-->
      <div class="succes-message hidden" id="success">
        <i class="fa-solid fa-check-circle"></i>
        <span>You're on the list! We'll notify you when we launch.</span>
      </div>

      <!--Social Links-->
      <div class="socials">
        <a href="#!">
          <div class="fa-brands fa-x-twitter"></div>
        </a>
        <a href="#!">
          <div class="fa-brands fa-instagram"></div>
        </a>
        <a href="#!">
          <div class="fa-brands fa-discord"></div>
        </a>
      </div>
    </main>


    <script src="script.js"></script>
  </body>
</html>
