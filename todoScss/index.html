<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css?family=Montserrat:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />
    <link rel="stylesheet" href="scss/style.css" />
    <script src="js/main.js" type="module"></script>
    <title>To Do List</title>
  <body>
    <main>
      <section class="newItemEntry">
        <form id="itemEntryForm">
          <label for="newItem">Enter a new to do item.</label>
          <input id="newItem" type="text" size="40" autocomplete="off" placeholder="Add Item" tabindex="0" />
          <button id="addItem" class="button" title="Add new item" aria-label="Add new item to list">+</button>
        </form>
      </section>

      <section class="listContainer">
        <div class="listTitle">
          <h1>To Do List</h1>
          <button id="clearItems" class="button" title="Clear the list" aria-label="Remove all item from the list" tabindex="0">Clear</button>
        </div>
        <hr />
        <div id="listItems">
          <div class="item">
            <input type="checkbox" id="1" tabindex="0">
            <label for="1">eat cake</label>
          </div>
          <div class="item">
            <input type="checkbox" id="2" tabindex="0">
            <label for="2">sleep</label>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
